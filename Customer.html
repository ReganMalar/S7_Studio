<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Registration Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Page Styling */
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Form Card */
.form-container {
  background: #ffffff;
  padding: 30px;
  width: 380px;
  border-radius: 15px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  animation: fadeIn 0.6s ease;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

.phone-group {
  display: flex;
  gap: 5px;
}

.phone-group select {
  width: 35%;
}

.phone-group input {
  width: 65%;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #667eea;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #5563c1;
}

/* Popup */
.popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  width: 300px;
  animation: zoom 0.4s ease;
}

.checkmark {
  font-size: 50px;
  color: #28a745;
  animation: bounce 0.6s ease;
}

.popup button {
  margin-top: 15px;
  background: #28a745;
}

.error {
  color: red;
  font-size: 13px;
  text-align: center;
  margin-bottom: 10px;
}

/* Animations */
@keyframes zoom {
  from {transform: scale(0.7); opacity:0;}
  to {transform: scale(1); opacity:1;}
}

@keyframes bounce {
  0% {transform: scale(0);}
  60% {transform: scale(1.2);}
  100% {transform: scale(1);}
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

</style>
</head>
<body>

<div class="form-container">
  <h2>Registration Form</h2>

  <div class="error" id="errorMsg"></div>

  <form id="myForm">

    <input type="text" name="name" placeholder="Full Name" required>

    <input type="email" name="email" id="email" placeholder="Email Address" required> 

    <div class="phone-group">
      <select name="countryCode" required>
        <option value="+91">+91 🇮🇳</option>
        <option value="+1">+1 🇺🇸</option>
        <option value="+44">+44 🇬🇧</option>
        <option value="+971">+971 🇦🇪</option>
      </select>
      <input type="tel" name="phone" id="phone" placeholder="Phone Number" required pattern="[0-9]{10}">
    </div>

    <!-- <textarea name="address" placeholder="Address" required></textarea> -->
      <select name="payment" required>
      <option value="">Select Payment Method</option>
      <option>UPI</option>
      <option>Credi Card</option>
      <option>Debit Card</option>
      <option>Net Banking</option>
    </select>

    <button type="submit">Submit</button>
  </form>
</div>

<!-- Success Popup -->
<div class="popup" id="successPopup">
  <div class="popup-content">
    <div class="checkmark">✓</div>
    <h2>Success!</h2>
    <p>Your details have been submitted successfully.</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby1247eAoNGG7DaC8n_Q3kmQ_-5UuYg0HcCd0npy0KjBmntgGE8OAMibac5_OWNfpsOgQ/exec"; // paste Google Apps Script URL
const form = document.getElementById("myForm");
const errorMsg = document.getElementById("errorMsg");

form.addEventListener("submit", e => {
  e.preventDefault();
  errorMsg.innerHTML = "";

  const phone = document.getElementById("phone").value;

  if(phone.length !== 10){
    errorMsg.innerHTML = "Phone number must be 10 digits.";
    return;
  }

  fetch(scriptURL, { method: "POST", body: new FormData(form)})
    .then(response => response.text())
    .then(data => {

      if(data === "DUPLICATE"){
        errorMsg.innerHTML = "Email already exists!";
      } else {
        showPopup();
        form.reset();
      }

    })
    .catch(error => alert("Error submitting form"));
});

function showPopup(){
  document.getElementById("successPopup").style.display = "flex";
}

function closePopup(){
  document.getElementById("successPopup").style.display = "none";
}

</script>

</body>
</html>
