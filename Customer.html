<!DOCTYPE html>
<html>
<head>
<title>Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card {
  background:white;
  padding:30px;
  border-radius:15px;
  width:350px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

h2 {
  text-align:center;
}

input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:10px;
  background:#764ba2;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover {
  opacity:0.9;
}

#message {
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
<h2>Register</h2>

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone Number" required>

<select id="payment">
<option value="">Select Payment Method</option>
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Net Banking</option>
<option>Cash</option>
</select>

<button onclick="submitForm()">Submit</button>

<div id="message"></div>
</div>

<script>
async function submitForm(){

var data = {
  name: document.getElementById("name").value,
  email: document.getElementById("email").value,
  phone: document.getElementById("phone").value,
  payment: document.getElementById("payment").value
};

if(!data.name || !data.email || !data.phone || !data.payment){
  document.getElementById("message").innerHTML = "Please fill all fields.";
  return;
}

var response = await fetch("https://script.google.com/macros/s/AKfycbxyPDOP30JaArY8VtiQJlxqEPngb1yIWhkIZWMsuQiyDA1IIyzH1Q1QEWHPk24NhnRo1g/exec", {
  method: "POST",
  body: JSON.stringify(data)
});

var result = await response.json();

if(result.status === "success"){
  document.getElementById("message").innerHTML = "Submitted Successfully!";
  document.querySelectorAll("input, select").forEach(el => el.value = "");
}
}
</script>

</body>
</html>
