<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registration Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Adobe dark workspace */

body{
margin:0;
height:100vh;
background:#1c1c1c;
font-family:Segoe UI, Arial;
display:flex;
justify-content:center;
align-items:center;
color:#ddd;
}

/* Panel */

.panel{
width:380px;
background:#2a2a2a;
border:1px solid #3a3a3a;
border-radius:6px;
box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

/* Panel header */

.panel-header{
background:#323232;
padding:12px;
font-size:14px;
font-weight:600;
border-bottom:1px solid #3a3a3a;
}

/* Panel body */

.panel-body{
padding:18px;
}

/* Labels */

label{
font-size:12px;
color:#aaa;
display:block;
margin-bottom:4px;
}

/* Inputs */

input,select{
width:100%;
padding:8px;
margin-bottom:14px;
background:#1c1c1c;
border:1px solid #444;
border-radius:3px;
color:#ddd;
font-size:13px;
}

input:focus,select:focus{
border-color:#2680eb;
outline:none;
}

/* Phone layout */

.phone-group{
display:flex;
gap:6px;
}

.phone-group select{
width:35%;
}

.phone-group input{
width:65%;
}

/* Buttons */

button{
width:100%;
padding:9px;
border:none;
background:#2680eb;
color:white;
border-radius:3px;
font-size:14px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#1473e6;
}

/* Check status button */

#checkStatusBtn{
background:#444;
}

#checkStatusBtn:hover{
background:#555;
}

/* Error */

.error{
color:#ff6b6b;
font-size:12px;
text-align:center;
margin-bottom:10px;
}

/* Popup */

.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.popup-content{
background:#2a2a2a;
padding:25px;
border-radius:6px;
text-align:center;
border:1px solid #444;
}

.checkmark{
font-size:40px;
color:#2680eb;
}

.popup button{
margin-top:12px;
}

</style>
</head>

<body>

<div class="panel">

<div class="panel-header">
Registration
</div>

<div class="panel-body">

<div class="error" id="errorMsg"></div>

<form id="myForm">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" id="email" required>

<label>Phone</label>

<div class="phone-group">
<select name="countryCode" required>
<option value="+91">+91</option>
<option value="+1">+1</option>
<option value="+44">+44</option>
<option value="+971">+971</option>
</select>

<input type="tel" name="phone" id="phone" pattern="[0-9]{10}" required>
</div>

<label>Payment Method</label>
<select name="payment" required>
<option value="">Select</option>
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Net Banking</option>
</select>

<button type="submit">Submit</button>

<button type="button" id="checkStatusBtn">
Check Activation Status
</button>

</form>

</div>
</div>

<!-- Success Popup -->

<div class="popup" id="successPopup">

<div class="popup-content">

<div class="checkmark">✔</div>

<h3>Success</h3>

<p>Your information has been submitted</p>

<button onclick="closePopup()">OK</button>

</div>

</div>

<script>

const scriptURL="YOUR_SCRIPT_URL_HERE";

const form=document.getElementById("myForm");
const errorMsg=document.getElementById("errorMsg");

/* Submit Form */

form.addEventListener("submit",function(e){

e.preventDefault();

errorMsg.innerHTML="";

const phone=document.getElementById("phone").value;

if(phone.length!==10){
errorMsg.innerHTML="Phone number must be 10 digits";
return;
}

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})

.then(res=>res.text())

.then(data=>{

if(data==="DUPLICATE"){
errorMsg.innerHTML="Email already exists";
}

else{
document.getElementById("successPopup").style.display="flex";
form.reset();
}

})

.catch(()=>alert("Error submitting form"));

});

/* Check Activation Status */

document.getElementById("checkStatusBtn").addEventListener("click",function(){

const email=document.getElementById("email").value;

if(!email){
errorMsg.innerHTML="Enter email to check status";
return;
}

fetch(scriptURL,{
method:"POST",
body:new URLSearchParams({
checkEmail:email
})
})

.then(res=>res.text())

.then(data=>{

if(data==="FOUND"){
alert("Activation already completed");
}
else{
alert("No activation found for this email");
}

})

.catch(()=>alert("Error checking status"));

});

/* Close popup */

function closePopup(){
document.getElementById("successPopup").style.display="none";
}

</script>

</body>
</html>
