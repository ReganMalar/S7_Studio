<!DOCTYPE html>
<html>
<head>
<title>Email Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  width: 350px;
  text-align: center;
  color: white;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  animation: fadeIn 1s ease-in-out;
}

h2 {
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 15px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #ffffff;
  color: #764ba2;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background: #f1f1f1;
  transform: scale(1.05);
}

#result {
  margin-top: 20px;
  animation: slideUp 0.5s ease-in-out;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 8px;
  font-size: 13px;
  border-bottom: 1px solid #eee;
}

th {
  text-align: left;
  background: #f4f4f4;
}

.loader {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #764ba2;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">
  <h2>Check Your Details</h2>

  <input type="email" id="email" placeholder="Enter your email">
  <button onclick="check()">Check</button>

  <div id="result"></div>
</div>

<script>
async function check() {
  var email = document.getElementById("email").value;

  if(email === ""){
    document.getElementById("result").innerHTML = "Please enter email.";
    return;
  }

  document.getElementById("result").innerHTML = "<div class='loader'></div>";

  var url = "https://script.google.com/macros/s/AKfycbw2vF-X8bRGTruJlonEUJ57gDuir440N2uVmMfKggw-lrdKj0gPesQCtJq2M4l8SxLB/exec?email=" 
            + encodeURIComponent(email);

  try {
    var response = await fetch(url);
    var data = await response.json();

    if (data.error) {
      document.getElementById("result").innerHTML = "<p>No record found</p>";
    } else {
      let output = "<table>";
      for (let key in data) {
        output += `<tr><th>${key}</th><td>${data[key]}</td></tr>`;
      }
      output += "</table>";
      document.getElementById("result").innerHTML = output;
    }
  } catch (error) {
    document.getElementById("result").innerHTML = "Error connecting to server.";
  }
}
</script>

</body>
</html>
